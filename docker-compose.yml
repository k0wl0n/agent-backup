version: '3.8'

services:
  agent:
    build: 
      context: .
      dockerfile: Dockerfile
    image: kowlon/jkwipe-agent:latest
    container_name: jokowipe-agent
    restart: unless-stopped
    environment:
      # Required
      JOKOWIPE_API_KEY: "${JOKOWIPE_API_KEY}"
      JOKOWIPE_SERVER_URL: "${JOKOWIPE_SERVER_URL:-https://api.jokowipe.id}"
      # Optional
      JOKOWIPE_AGENT_NAME: "${JOKOWIPE_AGENT_NAME:-}"
    volumes:
      # Persist backup staging files across container restarts.
      # Remove this if you want fully ephemeral backups (they are uploaded to
      # the platform immediately after creation anyway).
      - jokowipe_backups:/var/lib/jokowipe/backups
      # Optionally mount a config file for advanced settings (S3, GCS, etc.)
      # - ./agent.yaml:/etc/jokowipe/agent.yaml:ro
    # command: ["--config", "/etc/jokowipe/agent.yaml"]  # enable when using config mount
    network_mode: host  # lets agent reach databases on the host machine

networks:
  jokowipe-agent-net:
    driver: bridge

volumes:
  jokowipe_backups:
