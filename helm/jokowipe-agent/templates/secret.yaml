{{- if not .Values.agent.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "jokowipe-agent.fullname" . }}
  labels:
    {{- include "jokowipe-agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  JOKOWIPE_API_KEY: {{ required "agent.apiKey is required (or set agent.existingSecret)" .Values.agent.apiKey | quote }}
{{- end }}
