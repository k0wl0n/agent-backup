name: Build & Push Agent

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  DOCKERHUB_USERNAME: kowlon
  IMAGE_NAME: kowlon/jkwipe-agent

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      
      - name: Run unit tests (race detector)
        run: go test -race -count=1 ./...

  version:
    name: Calculate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.semver.outputs.version }}
      is_tag: ${{ steps.semver.outputs.is_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate Semantic Version
        id: semver
        run: |
          git fetch --tags --force

          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            echo "is_tag=true" >> $GITHUB_OUTPUT
            echo "::notice::Tag push detected: v$VERSION"
          else
            LATEST_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -n1)
            if [ -z "$LATEST_TAG" ]; then
              LATEST_TAG="v0.0.0"
            fi
            LATEST_VERSION="${LATEST_TAG#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_VERSION"
            PATCH=$((PATCH + 1))
            VERSION="$MAJOR.$MINOR.$PATCH"

            while git rev-parse -q --verify "refs/tags/v$VERSION" >/dev/null; do
              PATCH=$((PATCH + 1))
              VERSION="$MAJOR.$MINOR.$PATCH"
            done

            echo "is_tag=false" >> $GITHUB_OUTPUT
            echo "::notice::Auto-incrementing patch: $LATEST_VERSION -> $VERSION"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Git Tag (if not already tagged)
        if: steps.semver.outputs.is_tag == 'false' && github.ref == 'refs/heads/main'
        run: |
          VERSION="${{ steps.semver.outputs.version }}"
          TAG="v$VERSION"

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::notice::Tag $TAG already exists on remote, skipping creation."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Auto-release $TAG"

          # Try to push the tag
          if git push origin "$TAG" 2>&1 | tee /tmp/push_output.txt; then
            echo "::notice::Created and pushed tag $TAG"
          else
            # Check if the error is due to workflow file restrictions
            if grep -q "refusing to allow.*workflow" /tmp/push_output.txt; then
              echo "::warning::Cannot auto-create tag $TAG due to workflow file changes."
              echo "::warning::Please manually create the tag: git tag $TAG && git push origin $TAG"
              exit 0
            elif git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
              echo "::notice::Tag $TAG was created by another run; continuing."
            else
              echo "::error::Failed to push tag $TAG"
              cat /tmp/push_output.txt
              exit 1
            fi
          fi

  build:
    name: Build & Push Docker Image
    needs: [test, version]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push agent
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            VERSION=${{ needs.version.outputs.version }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT=${{ github.sha }}
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ needs.version.outputs.version }}
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: |
            type=gha,scope=agent
            type=registry,ref=${{ env.IMAGE_NAME }}:latest
          cache-to: type=gha,mode=max,scope=agent
