name: Release Binaries

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write
  actions: write
  packages: write

jobs:
  build-binaries:
    name: Build Multi-Arch Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            output: agent-linux-amd64
          - goos: linux
            goarch: arm64
            output: agent-linux-arm64
          - goos: darwin
            goarch: amd64
            output: agent-darwin-amd64
          - goos: darwin
            goarch: arm64
            output: agent-darwin-arm64
          - goos: windows
            goarch: amd64
            output: agent-windows-amd64.exe
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      
      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build \
            -ldflags="-X github.com/k0wl0n/agent-backup/internal/version.Version=${{ steps.version.outputs.VERSION }} \
                      -X github.com/k0wl0n/agent-backup/internal/version.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
                      -X github.com/k0wl0n/agent-backup/internal/version.GitCommit=${{ github.sha }}" \
            -o ${{ matrix.output }} \
            ./cmd/agent
      
      - name: Generate SHA256 checksum
        run: sha256sum ${{ matrix.output }} > ${{ matrix.output }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: |
            ${{ matrix.output }}
            ${{ matrix.output }}.sha256

  create-release:
    name: Create GitHub Release
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./binaries
      
      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release v${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            binaries/agent-linux-amd64/agent-linux-amd64
            binaries/agent-linux-amd64/agent-linux-amd64.sha256
            binaries/agent-linux-arm64/agent-linux-arm64
            binaries/agent-linux-arm64/agent-linux-arm64.sha256
            binaries/agent-darwin-amd64/agent-darwin-amd64
            binaries/agent-darwin-amd64/agent-darwin-amd64.sha256
            binaries/agent-darwin-arm64/agent-darwin-arm64
            binaries/agent-darwin-arm64/agent-darwin-arm64.sha256
            binaries/agent-windows-amd64.exe/agent-windows-amd64.exe
            binaries/agent-windows-amd64.exe/agent-windows-amd64.exe.sha256

  publish-helm:
    name: Publish Helm Chart (OCI → GHCR)
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update chart version to match release
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          sed -i "s/^version:.*/version: ${VERSION}/" helm/jokowipe-agent/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" helm/jokowipe-agent/Chart.yaml

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Package and push Helm chart
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          helm package helm/jokowipe-agent --version "${VERSION}" --app-version "${VERSION}"
          helm push "jokowipe-agent-${VERSION}.tgz" oci://ghcr.io/k0wl0n/charts

