services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pguser
      POSTGRES_PASSWORD: pgpassword
      POSTGRES_DB: sampledb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pguser -d sampledb"]
      interval: 5s
      timeout: 5s
      retries: 12

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: mysqluser
      MYSQL_PASSWORD: mysqlpassword
      MYSQL_DATABASE: sampledb
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "mysqluser", "-pmysqlpassword"]
      interval: 5s
      timeout: 5s
      retries: 12

  mongodb:
    image: mongo:6.0
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongouser
      MONGO_INITDB_ROOT_PASSWORD: mongopassword
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--username", "mongouser", "--password", "mongopassword", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 5s
      timeout: 10s
      retries: 12

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass redispassword
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redispassword", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
